apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-hello-world
  namespace: nginx-hello-world
  labels:
    app.kubernetes.io/name: nginx-hello-world
    app.kubernetes.io/part-of: storyops-smoke-tests
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nginx-hello-world
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nginx-hello-world
        app.kubernetes.io/part-of: storyops-smoke-tests
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: html-content
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
              readOnly: true
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-hello-world-config
        - name: html-content
          configMap:
            name: nginx-hello-world-content
