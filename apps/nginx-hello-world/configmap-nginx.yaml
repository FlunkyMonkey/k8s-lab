apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-hello-world-config
  namespace: nginx-hello-world
  labels:
    app.kubernetes.io/name: nginx-hello-world
    app.kubernetes.io/part-of: storyops-smoke-tests
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;
      root /usr/share/nginx/html;
      index index.html;

      location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok\n';
      }

      location / {
        try_files $uri $uri/ /index.html;
      }
    }
